<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEW NEO x BANANA Automator</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4f0; /* Cream White */
            font-family: 'Google Sans', sans-serif;
            padding: 2rem;
            color: #111;
        }
        .neo-box {
            max-width: 650px;
            margin: 0 auto;
            background-color: #fff;
            border: 4px solid #111;
            box-shadow: 8px 8px 0px #111;
            padding: 2rem;
        }
        h1 {
            text-transform: uppercase;
            font-weight: 900;
            font-size: 2rem;
            border-bottom: 4px solid #111;
            padding-bottom: 10px;
            margin-top: 0;
        }
        label {
            font-weight: 700;
            display: block;
            margin-top: 20px;
            font-size: 1.1rem;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 3px solid #111;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: 'Google Sans', sans-serif;
            background-color: #fff;
        }
        input:focus, select:focus {
            outline: none;
            background-color: #e0f7fa; /* Electric Blue nyala sikit */
        }
        button {
            padding: 15px;
            background-color: #ff5722; /* Vibrant Orange */
            color: #fff;
            font-size: 1.2rem;
            font-weight: 900;
            border: 4px solid #111;
            box-shadow: 6px 6px 0px #111;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            transition: all 0.1s;
        }
        button:active {
            box-shadow: 0px 0px 0px #111;
            transform: translate(6px, 6px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Generate button spacing */
        #btn-generate {
            margin-top: 25px;
        }

        #result-box {
            margin-top: 30px;
            padding: 20px;
            border: 4px dashed #111;
            background-color: #fffde7;
            font-size: 1rem;
            line-height: 1.5;
            white-space: pre-wrap; /* Biar spasi dan enter dari AI kebaca */
            display: none;
        }

        /* === ACTION BUTTONS ROW === */
        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .action-row button {
            flex: 1;
            font-size: 0.95rem;
            padding: 12px 10px;
        }

        /* Copy button - Electric Blue */
        #btn-copy {
            background-color: #0091ea;
        }
        #btn-copy.copied {
            background-color: #00c853;
        }

        /* n8n button - Deep Purple */
        #btn-n8n {
            background-color: #7c4dff;
        }
        #btn-n8n.sent {
            background-color: #00c853;
        }

        /* === HISTORY SECTION === */
        .history-section {
            max-width: 650px;
            margin: 30px auto 0;
            background-color: #fff;
            border: 4px solid #111;
            box-shadow: 8px 8px 0px #111;
            padding: 1.5rem 2rem;
        }
        .history-section h2 {
            text-transform: uppercase;
            font-weight: 900;
            font-size: 1.4rem;
            border-bottom: 3px solid #111;
            padding-bottom: 8px;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .history-section h2 .badge {
            background-color: #ff5722;
            color: #fff;
            font-size: 0.75rem;
            padding: 3px 10px;
            border: 3px solid #111;
            box-shadow: 3px 3px 0px #111;
        }
        .history-empty {
            color: #888;
            font-style: italic;
            padding: 10px 0;
        }
        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .history-item button {
            flex: 1;
            text-align: left;
            background-color: #e8eaf6;
            color: #111;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 12px 14px;
            border: 3px solid #111;
            box-shadow: 4px 4px 0px #111;
            text-transform: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item button:hover {
            background-color: #c5cae9;
        }
        .history-item button:active {
            box-shadow: 0px 0px 0px #111;
            transform: translate(4px, 4px);
        }
        .history-delete {
            flex: 0 0 auto;
            width: 42px;
            min-width: 42px;
            padding: 10px 0;
            background-color: #ff1744;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 900;
            border: 3px solid #111;
            box-shadow: 4px 4px 0px #111;
            text-align: center;
        }
        .history-delete:active {
            box-shadow: 0px 0px 0px #111;
            transform: translate(4px, 4px);
        }
        #btn-clear-history {
            margin-top: 16px;
            background-color: #111;
            color: #fff;
            font-size: 0.85rem;
            padding: 10px;
            border: 3px solid #111;
            box-shadow: 4px 4px 0px #ff5722;
        }
        #btn-clear-history:active {
            box-shadow: 0px 0px 0px #ff5722;
            transform: translate(4px, 4px);
        }
    </style>
</head>
<body>

    <div class="neo-box">
        <h1>New Neo Content Engine</h1>
        
        <label>1. Link YouTube Target</label>
        <input type="text" id="yt-link" placeholder="https://youtube.com/watch?v=...">

        <label>2. Mau Dibikin Apa?</label>
        <select id="content-type">
            <option value="CAROUSEL">Carousel / Slide (Instagram/Threads)</option>
            <option value="SINGLE POST">Single Post / Feed (Poster Informatif)</option>
            <option value="REELS">Reels / TikTok / Video Script</option>
        </select>

        <button id="btn-generate" onclick="bakarKonten()">Bakar Konten Sekarang!</button>

        <div id="result-box">Menunggu instruksi...</div>

        <!-- Action Buttons: Copy + n8n -->
        <div class="action-row" id="action-row" style="display: none;">
            <button id="btn-copy" onclick="copyDraf()">📋 Copy Draf Teks</button>
            <button id="btn-n8n" onclick="lemparN8n()">⚡ Lempar ke n8n</button>
        </div>
    </div>

    <!-- History Section -->
    <div class="history-section">
        <h2>🥩 History Daging <span class="badge" id="history-count">0</span></h2>
        <div id="history-list">
            <p class="history-empty">Belum ada riwayat. Bakar konten dulu bos!</p>
        </div>
        <button id="btn-clear-history" onclick="clearHistory()" style="display: none;">🗑️ Hapus Semua Riwayat</button>
    </div>

    <script>
        const HISTORY_KEY = 'neo_history';
        const MAX_HISTORY = 5;

        // ========== LOAD HISTORY ON PAGE LOAD ==========
        window.addEventListener('DOMContentLoaded', renderHistory);

        // ========== MAIN GENERATE FUNCTION ==========
        async function bakarKonten() {
            const ytLink = document.getElementById('yt-link').value;
            const contentType = document.getElementById('content-type').value;
            const btn = document.getElementById('btn-generate');
            const resultBox = document.getElementById('result-box');
            const actionRow = document.getElementById('action-row');

            if (!ytLink) {
                alert("Masukin link YouTube-nya dulu bos!");
                return;
            }

            // Ganti state loading
            btn.innerText = "Lagi Masak Daging...";
            btn.disabled = true;
            resultBox.style.display = "block";
            actionRow.style.display = "none";
            resultBox.innerText = "The Neo lagi narik transcript dan mikir struktur " + contentType + "...";

            try {
                // Nembak ke backend Netlify lu
                const response = await fetch('/.netlify/functions/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ytUrl: ytLink, contentType: contentType })
                });

                const data = await response.json();

                if (data.error) {
                    resultBox.innerText = "Waduh error bos: " + data.error;
                } else {
                    resultBox.innerHTML = "<strong>HASIL THE NEO:</strong>\n\n" + data.content;
                    actionRow.style.display = "flex";

                    // Auto-save ke history
                    saveToHistory(contentType, data.content);
                }
            } catch (err) {
                resultBox.innerText = "Gagal konek ke server: " + err;
            }

            // Balikin state tombol
            btn.innerText = "Bakar Konten Sekarang!";
            btn.disabled = false;
        }

        // ========== FITUR 1: COPY DRAF TEKS ==========
        function copyDraf() {
            const resultBox = document.getElementById('result-box');
            const btn = document.getElementById('btn-copy');
            const textContent = resultBox.innerText;

            navigator.clipboard.writeText(textContent).then(() => {
                const originalText = btn.innerHTML;
                btn.innerHTML = "✅ Copied!";
                btn.classList.add('copied');

                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                alert("Gagal copy: " + err);
            });
        }

        // ========== FITUR 2: LEMPAR KE n8n ==========
        async function lemparN8n() {
            const resultBox = document.getElementById('result-box');
            const btn = document.getElementById('btn-n8n');
            const textContent = resultBox.innerText;

            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ Sending...";
            btn.disabled = true;

            try {
                await fetch('https://webhook.n8n.com/dummy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: textContent, timestamp: new Date().toISOString() })
                });

                btn.innerHTML = "✅ Terkirim!";
                btn.classList.add('sent');
            } catch (err) {
                btn.innerHTML = "❌ Gagal Kirim";
            }

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.remove('sent');
                btn.disabled = false;
            }, 2000);
        }

        // ========== FITUR 3: AUTO-SAVE HISTORY ==========
        function getHistory() {
            try {
                return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
            } catch {
                return [];
            }
        }

        function saveToHistory(type, content) {
            const history = getHistory();
            const entry = {
                id: Date.now(),
                type: type,
                content: content,
                date: new Date().toLocaleString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' })
            };

            history.unshift(entry); // Terbaru di atas

            // Limit max 5
            if (history.length > MAX_HISTORY) {
                history.length = MAX_HISTORY;
            }

            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const history = getHistory();
            const listEl = document.getElementById('history-list');
            const countEl = document.getElementById('history-count');
            const clearBtn = document.getElementById('btn-clear-history');

            countEl.innerText = history.length;

            if (history.length === 0) {
                listEl.innerHTML = '<p class="history-empty">Belum ada riwayat. Bakar konten dulu bos!</p>';
                clearBtn.style.display = 'none';
                return;
            }

            clearBtn.style.display = 'block';
            listEl.innerHTML = '';

            history.forEach((entry, index) => {
                const preview = entry.content.substring(0, 60).replace(/<[^>]*>/g, '') + '...';
                const itemDiv = document.createElement('div');
                itemDiv.className = 'history-item';
                itemDiv.innerHTML = `
                    <button onclick="loadHistory(${index})" title="${entry.date}">
                        <strong>[${entry.type}]</strong> ${entry.date} — ${preview}
                    </button>
                    <button class="history-delete" onclick="deleteHistory(${index})" title="Hapus">✕</button>
                `;
                listEl.appendChild(itemDiv);
            });
        }

        function loadHistory(index) {
            const history = getHistory();
            if (history[index]) {
                const resultBox = document.getElementById('result-box');
                const actionRow = document.getElementById('action-row');
                resultBox.style.display = 'block';
                resultBox.innerHTML = "<strong>HASIL THE NEO (dari History):</strong>\n\n" + history[index].content;
                actionRow.style.display = 'flex';
            }
        }

        function deleteHistory(index) {
            const history = getHistory();
            history.splice(index, 1);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderHistory();
        }

        function clearHistory() {
            if (confirm("Yakin mau hapus semua riwayat?")) {
                localStorage.removeItem(HISTORY_KEY);
                renderHistory();
            }
        }
    </script>
</body>
</html>
